<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>INSD WF Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>

    <div class="header-layout-section">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="header-layout-image text-center">
                        <img src="images/logo.webp" class="img-fluid" alt="" srcset="">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="thank-you-container">
        <svg class="illustration" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="60" y="40" width="80" height="100" rx="4" stroke="#333" stroke-width="2" fill="white" />
            <line x1="75" y1="65" x2="125" y2="65" stroke="#ccc" stroke-width="2" />
            <line x1="75" y1="80" x2="125" y2="80" stroke="#ccc" stroke-width="2" />
            <line x1="75" y1="95" x2="100" y2="95" stroke="#ccc" stroke-width="2" />
            <circle cx="130" cy="55" r="20" fill="#2547a9" />
            <path d="M122 55L127 60L138 49" stroke="white" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round" />
            <path d="M50 45L55 40L50 35" stroke="#d4af37" stroke-width="2" opacity="0.6" />
            <path d="M150 110L155 115L150 120" stroke="#d4af37" stroke-width="2" opacity="0.6" />
        </svg>

        <h1 class="thank-you-title">Thank You for Reaching Out!</h1>

        <p class="thank-you-text">
            We’ve received your information and are excited to connect with you. Our
            team will contact you shortly to discuss your needs and how we can help.
        </p>
    </div>


    <footer>
        <div class="footer-layout">Designed and Developed by Mediagarh</div>
    </footer>
    <style>
        .fabiconswindow {
            position: fixed;
            right: 0px;
            top: 45%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .fabiconswindow .nav-item {
            width: 60px;
            height: 60px;
            background-color: #b01812;
            color: #fff;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px !important;
            cursor: pointer;
            margin: 5px 0px;
            transition: background-color 0.3s ease;
        }

        .fabiconswindow .nav-item:hover {
            background-color: #b01812;
        }

        .fabiconswindow .nav-item a {
            color: white;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        @media only screen and (max-width: 768px) {
            .resenqerymenu {
                width: 100%;
                position: fixed;
                z-index: 99999;
                bottom: 0px;
                left: 0px;
                border-left: 0px;
                background: #054C81;
                display: block;
                cursor: pointer;
                text-align: center;
                padding: 5px 0;
                font-size: 17px;
                color: #fff;
                border-top-left-radius: 5px;
                border-top-right-radius: 5px;
                vertical-align: middle;
                font-weight: 600;
                padding: 0px !important;
            }
        }

        .resenqerymenu .nav-item {
            font-size: 25px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-right: 1px solid #fff;
            padding: 8px 4px;
        }

        .resenqerymenu .nav-item a {
            color: #fff;
            text-decoration: none;
        }

        .icons {
            font-size: 20px;
        }

        .whatsbtn {
            width: 60px;
            height: 60px;
            font-size: 30px;
            background-color: #b01812;
            color: #fff;
            border-radius: 50%;
            padding: 10px;
        }

        .whatsbtn:hover {
            background-color: #b01812;
        }

        @media only screen and (max-width: 767px) {
            #__eechatIcon {
                right: 0px !important;
            }

            .indicator {
                right: 65px !important;
            }

            #menu-header-menu {
                display: block !important;
            }

            .navbar-item {
                display: block;
            }

            #menu-item-122 {
                margin-top: 10px;
            }

            .tpcoundown__btn {
                margin-top: 20px;
                margin-bottom: 30px;
            }

            .section__content p {
                color: var(--tp-common-white);
                font-size: 14px;
            }
        }

        .programmain {
            padding: 30px 0px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fromprogram {
            background-color: #fff;
            box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px;
            padding: 20px 15px;
            border-radius: 10px;
        }

        .fromprogram .fromhedinngs {
            font-size: 22px;
            line-height: 30px;
            font-weight: 700;
            text-align: center;
        }

        .fromprogram input {
            margin-bottom: 20px;
            border-radius: 2px;
            border: solid 1px #e0e0e0;
            padding: 8px 10px;
            width: 100%;
            box-sizing: border-box;
            font-size: 15px;
        }

        .fromprogram select {
            margin-bottom: 10px;
            border-radius: 2px;
            border: solid 1px #e0e0e0;
            padding: 10px 10px;
            width: 100%;
            box-sizing: border-box;
            font-size: 15px;
        }

        .fromprogram select:focus {
            outline: none;
            border-color: #e0e0e0;
            box-shadow: none;
        }

        .fromprogram input:focus {
            outline: none;
            border-color: #e0e0e0;
            box-shadow: none;
        }

        .register-btn {
            padding: 12px 30px;
            background-color: #b11714;
            color: white;
            border: none;
            border-radius: 5px;
            text-align: center;
            margin-top: 15px;
        }

        .register-btn:hover {
            padding: 12px 30px;
            background-color: #7e0907;
            color: white;
            border: none;
            border-radius: 5px;
            text-align: center;
            margin-top: 15px;
        }

        .courseoferd {
            font-size: 14px;
            font-weight: 600;
            line-height: 30px;
            text-align: center;
            padding-bottom: 10px;

        }

        .displayclass {
            display: flex;
            justify-content: start;
            align-items: center;
        }

        .courseoferd .courseoffer {
            font-size: 16px;
            font-weight: 600;
            line-height: 28px;
            color: #174a88;
            text-align: center;

        }

        .thank-you-container {
            max-width: 650px;
            margin: auto;
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .illustration {
            width: 150px;
            height: auto;
            margin-bottom: 30px;
        }

        .thank-you-title {
            font-weight: 700;
            font-size: 2.5rem;
            color: #000;
            margin-bottom: 20px;
        }

        .thank-you-text {
            color: #6c757d;
            font-size: 1.15rem;
            line-height: 1.6;
            padding: 0 40px;
        }

        /* Mobile Responsive */
        @media (max-width: 576px) {
            .thank-you-title {
                font-size: 1.8rem;
            }

            .thank-you-text {
                padding: 0 10px;
                font-size: 1rem;
            }
        }
    </style>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
</script>
<script src="javascript/javascript.js"></script>

</html>
